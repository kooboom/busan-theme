<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Theme Travel Guide</title>
    <!-- Tailwind CSS: 별도 설치 없이 디자인을 입혀줍니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 프리텐다드 폰트: 글자체를 깔끔하게 바꿔줍니다 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        /* 설명글이 길 경우 3줄까지만 보여주고 '...' 처리합니다 */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-blue-100">

    <!-- 1. 상단 네비게이션 (고정형) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic">BUSAN VIBE</h1>
            <button onclick="fetchThemeData()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95 text-sm">
                새로고침
            </button>
        </div>
    </nav>

    <!-- 2. 메인 컨텐츠 영역 -->
    <main class="max-w-7xl mx-auto px-6 py-16">
        <!-- 페이지 제목 섹션 -->
        <header class="mb-16">
            <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">부산 테마 여행 코스</h2>
            <p class="text-lg text-slate-500 font-medium leading-relaxed">
                교육대학원 학생들과 함께 만드는 <br class="hidden md:block">
                공공데이터 기반 부산 여행 가이드 서비스입니다.
            </p>
        </header>

        <!-- 3. 카드 그리드 (반응형: 1열 -> 2열 -> 3열 -> 4열) -->
        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- 데이터 로딩 중 표시 -->
            <div class="col-span-full py-32 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-slate-400 font-bold">부산의 테마 여행지를 불러오고 있습니다...</p>
            </div>
        </div>
    </main>

    <!-- 4. 하단 정보 -->
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">
                &copy; 2026 Busan Theme Travel Project. Powered by Public Data Portal.
            </p>
        </div>
    </footer>

    <!-- 5. 기능 제어 자바스크립트 -->
    <script>
        async function fetchThemeData() {
            const grid = document.getElementById('theme-grid');
            
            try {
                // Vercel 서버리스 함수 호출
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                
                // 공공데이터 API 응답 구조에서 실제 데이터 리스트(item)만 추출
                const items = result.getRecommendedKr?.item || 
                              result.response?.body?.items?.item || [];
                
                if (items.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 bg-slate-100 rounded-3xl text-slate-500 font-bold">현재 제공 가능한 여행 정보가 없습니다.</div>';
                    return;
                }

                let html = '';
                items.forEach(item => {
                    // 이미지가 없는 경우를 대비한 기본 샘플 이미지
                    const imageUrl = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1000&auto=format&fit=crop';
                    
                    html += `
                    <div class="group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 border border-slate-100 flex flex-col">
                        <!-- 카드 상단: 이미지 -->
                        <div class="relative overflow-hidden aspect-[4/3]">
                            <img src="${imageUrl}" alt="${item.MAIN_TITLE}" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <!-- 구 명칭 태그 -->
                            <div class="absolute top-6 left-6">
                                <span class="bg-white/95 backdrop-blur text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm tracking-widest uppercase">
                                    ${item.GUGUN_NM || 'BUSAN'}
                                </span>
                            </div>
                        </div>
                        
                        <!-- 카드 하단: 텍스트 정보 -->
                        <div class="p-8 flex-1 flex flex-col">
                            <h3 class="text-xl font-extrabold text-slate-800 mb-4 group-hover:text-blue-600 transition-colors line-clamp-1">
                                ${item.MAIN_TITLE}
                            </h3>
                            <p class="text-slate-500 text-sm line-clamp-3 leading-relaxed mb-8 flex-1">
                                ${item.ITEMCNTNTS || '상세 테마 여행 정보가 준비 중입니다.'}
                            </p>
                            
                            <!-- 푸터: 주소 및 지도 링크 -->
                            <div class="pt-6 border-t border-slate-50 flex justify-between items-center">
                                <div class="flex items-center text-[10px] font-bold text-slate-400 tracking-tighter">
                                    <span class="mr-1.5 text-blue-400">📍</span>
                                    ${item.ADDR1.split(' ').slice(0, 2).join(' ')}
                                </div>
                                <a href="https://map.kakao.com/?q=${encodeURIComponent(item.MAIN_TITLE)}" target="_blank" 
                                   class="text-[10px] font-black text-blue-600 hover:text-blue-800 tracking-widest border-b-2 border-blue-100 pb-0.5 transition-colors">
                                    MAP VIEW →
                                </a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                
                grid.innerHTML = html;
            } catch (error) {
                console.error("Fetch Error:", error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">서버와의 통신에 실패했습니다. API 설정을 확인해 주세요.</div>';
            }
        }

        // 페이지가 열리자마자 데이터를 불러옵니다
        window.onload = fetchThemeData;
    </script>
</body>
</html>
