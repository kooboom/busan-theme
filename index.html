<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Vibe v3.0</title> <!-- 💡 버전 번호를 확인하세요 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * { font-family: 'Pretendard', sans-serif !important; }
        .line-clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic">BUSAN VIBE <span class="text-xs text-slate-300">v3.0</span></h1>
            <button onclick="location.reload(true)" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm">
                강력 새로고침
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full py-20 text-center font-bold text-slate-400">데이터 로딩 중...</div>
        </div>
    </main>

    <script>
        function toggleText(idx) {
    const shortEl = document.getElementById(`short-${idx}`);
    const fullEl = document.getElementById(`full-${idx}`);
    const btn = document.getElementById(`btn-${idx}`);

    if (fullEl.style.display === 'none') {
        fullEl.style.display = 'block';
        shortEl.style.display = 'none';
        btn.innerText = '접기 -';
    } else {
        fullEl.style.display = 'none';
        shortEl.style.display = 'block';
        btn.innerText = '더보기 +';
    }
}

        async function fetchThemeData() {
            const grid = document.getElementById('theme-grid');
            try {
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                const items = result.getRecommendedKr?.item || result.response?.body?.items?.item || [];

                let html = '';
                items.forEach((item, idx) => {
                    // 1. 모든 HTML 태그를 정규식으로 완전히 제거 (글꼴/줄바꿈 방해 차단)
                    const cleanText = (item.ITEMCNTNTS || '').replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').trim();
                    
                    // 2. 무조건 50자에서 썰어버림 (CSS가 아닌 데이터 레벨 절단)
                    const isLong = cleanText.length > 50;
                    const shortText = isLong ? cleanText.substring(0, 50) + '...' : cleanText;
                    
                    const imageUrl = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e';

                    html += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 flex flex-col h-full">
                        <div class="relative aspect-[4/3] bg-slate-200">
                            <img src="${imageUrl}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-6 flex flex-col flex-1">
                            <h3 class="text-lg font-bold text-slate-800 mb-3 line-clamp-1">${item.MAIN_TITLE}</h3>
                            
                            <div class="flex-1 cursor-pointer" onclick="toggleText(${idx})">
                                <p id="short-${idx}" class="text-slate-500 text-sm leading-relaxed line-clamp-3" style="display:block">
    ${cleanText}
</p>
                                <p id="full-${idx}" class="text-slate-500 text-sm leading-relaxed" style="display:none">
    ${cleanText}
</p>
                                ${isLong ? `<button id="btn-${idx}" class="text-xs font-bold text-blue-500 mt-2">더보기 +</button>` : ''}
                            </div>
                        </div>
                    </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (e) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">데이터 오류</div>';
            }
        }
        window.onload = fetchThemeData;
    </script>
</body>
</html>
