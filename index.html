<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Theme Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        /* 모든 요소에 폰트를 강제하고 여백을 초기화합니다 */
        * { 
            font-family: 'Pretendard', sans-serif !important; 
            word-break: keep-all; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">BUSAN VIBE</h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-md">
                페이지 새로고침
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <header class="mb-12">
            <h2 class="text-3xl font-black text-slate-800 mb-2">부산 테마 여행 코스</h2>
            <p class="text-slate-500 font-medium">데이터가 동일하게 보인다면 '강력 새로고침'을 해주세요.</p>
        </header>

        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 text-center text-slate-400 font-bold">데이터를 불러오는 중...</div>
        </div>
    </main>

    <script>
        // 💡 텍스트를 펼치고 접는 로직을 완전히 새로 짰습니다
        function toggleText(idx) {
            const shortEl = document.getElementById(`short-${idx}`);
            const fullEl = document.getElementById(`full-${idx}`);
            const btn = document.getElementById(`btn-${idx}`);

            if (fullEl.classList.contains('hidden')) {
                fullEl.classList.remove('hidden');
                shortEl.classList.add('hidden');
                btn.innerText = '접기 -';
            } else {
                fullEl.classList.add('hidden');
                shortEl.classList.remove('hidden');
                btn.innerText = '더보기 +';
            }
        }

        async function fetchThemeData() {
            const grid = document.getElementById('theme-grid');
            try {
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                const items = result.getRecommendedKr?.item || result.response?.body?.items?.item || [];

                let html = '';
                items.forEach((item, idx) => {
                    // 1. HTML 태그 완전 제거 및 텍스트 정리
                    const rawText = (item.ITEMCNTNTS || '정보가 없습니다.').replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ');
                    
                    // 2. 자바스크립트로 80자만 잘라서 저장 (CSS가 아닌 데이터 레벨에서 자름)
                    const shortText = rawText.length > 80 ? rawText.substring(0, 80) + '...' : rawText;
                    
                    const imageUrl = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e';

                    html += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 flex flex-col h-full">
                        <div class="relative aspect-[4/3] overflow-hidden bg-slate-200">
                            <img src="${imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-4 left-4">
                                <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-blue-600 shadow-sm">
                                    ${item.GUGUN_NM || 'BUSAN'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="p-7 flex flex-col flex-1">
                            <h3 class="text-lg font-extrabold text-slate-800 mb-4 leading-snug">${item.MAIN_TITLE}</h3>
                            
                            <div class="flex-1 cursor-pointer group" onclick="toggleText(${idx})">
                                <!-- 요약 텍스트 -->
                                <p id="short-${idx}" class="text-slate-500 text-[13px] leading-relaxed mb-1">
                                    ${shortText}
                                </p>
                                <!-- 전체 텍스트 (기본은 숨김) -->
                                <p id="full-${idx}" class="hidden text-slate-500 text-[13px] leading-relaxed mb-1">
                                    ${rawText}
                                </p>
                                <button id="btn-${idx}" class="text-[11px] font-bold text-blue-500 group-hover:underline">
                                    ${rawText.length > 80 ? '더보기 +' : ''}
                                </button>
                            </div>
                            
                            <div class="mt-6 pt-5 border-t border-slate-50 flex justify-between items-center text-[10px] font-bold text-slate-400">
                                <span>📍 ${item.ADDR1.split(' ').slice(0, 2).join(' ')}</span>
                                <a href="https://map.kakao.com/?q=${encodeURIComponent(item.MAIN_TITLE)}" target="_blank" class="text-blue-600">지도보기 →</a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (e) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400 font-bold">데이터를 로드할 수 없습니다.</div>';
            }
        }
        window.onload = fetchThemeData;
    </script>
</body>
</html>            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">부산 테마 여행 코스</h2>
            <p class="text-slate-500 font-medium text-lg">텍스트를 누르면 전체 내용이 펼쳐집니다.</p>
        </header>

        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <div class="col-span-full py-32 text-center text-slate-400 font-bold animate-pulse">데이터 로딩 중...</div>
        </div>
    </main>

    <script>
        // 텍스트 토글 함수
        function toggleContent(idx) {
            const el = document.getElementById(`desc-${idx}`);
            const btn = document.getElementById(`btn-${idx}`);
            if (el.classList.contains('line-clamp-custom')) {
                el.classList.remove('line-clamp-custom');
                el.classList.add('expanded');
                btn.innerText = '접기 -';
            } else {
                el.classList.add('line-clamp-custom');
                el.classList.remove('expanded');
                btn.innerText = '더보기 +';
            }
        }

        // HTML 태그를 제거하는 안전 함수
        function stripHtml(html) {
            let doc = new DOMParser().parseFromString(html, 'text/html');
            return doc.body.textContent || "";
        }

        async function fetchThemeData() {
            const grid = document.getElementById('theme-grid');
            try {
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                const items = result.getRecommendedKr?.item || result.response?.body?.items?.item || [];

                let html = '';
                items.forEach((item, idx) => {
                    // API 데이터 내의 HTML 태그를 제거하여 글꼴과 줄바꿈을 초기화합니다.
                    const cleanText = stripHtml(item.ITEMCNTNTS || '정보가 없습니다.');
                    const imageUrl = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e';

                    html += `
                    <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-slate-100 flex flex-col">
                        <div class="relative aspect-[4/3] overflow-hidden">
                            <img src="${imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-6 left-6">
                                <span class="bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black text-blue-600 shadow-sm uppercase tracking-widest">
                                    ${item.GUGUN_NM || 'BUSAN'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="p-8 flex-1 flex flex-col">
                            <h3 class="text-xl font-extrabold text-blue-600 mb-5 leading-tight">${item.MAIN_TITLE}</h3>
                            
                            <div class="cursor-pointer group/text" onclick="toggleContent(${idx})">
                                <p id="desc-${idx}" class="line-clamp-custom text-slate-500 text-[14px] leading-relaxed mb-2 transition-all">
                                    ${cleanText}
                                </p>
                                <button id="btn-${idx}" class="text-[11px] font-bold text-blue-400 group-hover/text:text-blue-600 mb-6 transition-colors">
                                    더보기 +
                                </button>
                            </div>
                            
                            <div class="mt-auto pt-6 border-t border-slate-50 flex justify-between items-center">
                                <span class="text-[10px] font-bold text-slate-400">📍 ${item.ADDR1.split(' ').slice(0, 2).join(' ')}</span>
                                <a href="https://map.kakao.com/?q=${encodeURIComponent(item.MAIN_TITLE)}" target="_blank" class="text-[10px] font-black text-blue-600 border-b-2 border-blue-50">MAP →</a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (e) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">데이터를 불러올 수 없습니다.</div>';
            }
        }
        window.onload = fetchThemeData;
    </script>
</body>
</html>
