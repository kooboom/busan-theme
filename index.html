<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Theme Travel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        /* 💡 기본 3줄만 보여주는 스타일 */
        .description-content {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        /* 💡 클릭하여 확장했을 때 보여주는 스타일 */
        .description-content.expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-blue-100">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic">BUSAN VIBE</h1>
            <button onclick="fetchThemeData()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95 text-sm">
                새로고침
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <header class="mb-16">
            <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">부산 테마 여행 코스</h2>
            <p class="text-lg text-slate-500 font-medium">텍스트를 클릭하면 전체 내용을 확인할 수 있습니다.</p>
        </header>

        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <div class="col-span-full py-32 text-center text-slate-400 font-bold animate-pulse">
                데이터를 불러오고 있습니다...
            </div>
        </div>
    </main>

    <script>
        // 💡 텍스트를 펼치거나 접는 함수
        function toggleDescription(id) {
            const content = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                btn.innerText = '더보기 +';
            } else {
                content.classList.add('expanded');
                btn.innerText = '접기 -';
            }
        }

        async function fetchThemeData() {
            const grid = document.getElementById('theme-grid');
            try {
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                const items = result.getRecommendedKr?.item || result.response?.body?.items?.item || [];
                
                if (items.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 bg-slate-100 rounded-3xl text-slate-500 font-bold">데이터가 없습니다.</div>';
                    return;
                }

                let html = '';
                items.forEach((item, index) => {
                    const imageUrl = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e';
                    
                    html += `
                    <div class="group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-slate-100 flex flex-col">
                        <div class="relative overflow-hidden aspect-[4/3]">
                            <img src="${imageUrl}" alt="${item.MAIN_TITLE}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            <div class="absolute top-6 left-6">
                                <span class="bg-white/95 backdrop-blur text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm tracking-widest uppercase">
                                    ${item.GUGUN_NM || 'BUSAN'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="p-8 flex-1 flex flex-col">
                            <h3 class="text-xl font-extrabold text-slate-800 mb-4 line-clamp-1">${item.MAIN_TITLE}</h3>
                            
                            <!-- 💡 클릭 가능한 설명 영역 -->
                            <div class="cursor-pointer" onclick="toggleDescription(${index})">
                                <p id="desc-${index}" class="description-content text-slate-500 text-sm leading-relaxed mb-2">
                                    ${item.ITEMCNTNTS || '정보가 없습니다.'}
                                </p>
                                <button id="btn-${index}" class="text-[11px] font-bold text-blue-500 mb-6 hover:text-blue-700">
                                    더보기 +
                                </button>
                            </div>
                            
                            <div class="mt-auto pt-6 border-t border-slate-50 flex justify-between items-center">
                                <div class="text-[10px] font-bold text-slate-400">
                                    📍 ${item.ADDR1.split(' ').slice(0, 2).join(' ')}
                                </div>
                                <a href="https://map.kakao.com/?q=${encodeURIComponent(item.MAIN_TITLE)}" target="_blank" 
                                   class="text-[10px] font-black text-blue-600 tracking-widest border-b-2 border-blue-50 pb-0.5">
                                    MAP →
                                </a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (error) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold">통신 실패</div>';
            }
        }
        window.onload = fetchThemeData;
    </script>
</body>
</html>
