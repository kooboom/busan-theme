<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산 테마 여행 가이드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 고품질 한글 폰트 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 상단 네비게이션 -->
    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic">BUSAN VIBE</h1>
            <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-700 transition shadow-lg active:scale-95 text-sm">
                코스 새로고침
            </button>
        </div>
    </nav>

    <!-- 메인 대시보드 -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-16 text-center md:text-left">
            <h2 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">부산 테마 여행 코스</h2>
            <p class="text-gray-500 font-medium">데이터로 만나는 부산의 숨은 매력</p>
        </header>

        <!-- 여행지 카드 그리드 -->
        <div id="theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- 데이터가 로드되면 여기에 카드가 생성됩니다 -->
            <div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">
                데이터를 불러오는 중입니다...
            </div>
        </div>
    </main>

    <script>
        async function fetchData() {
            const grid = document.getElementById('theme-grid');
            try {
                // Vercel 서버리스 함수 호출
                const response = await fetch('/api/theme?numOfRows=12');
                const result = await response.json();
                
                // 공공데이터 특유의 복잡한 응답 경로를 안전하게 체크
                const items = result.getRecommendedKr?.item || 
                              result.response?.body?.items?.item || [];
                
                if (items.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">데이터가 없습니다. API 설정을 확인하세요.</div>';
                    return;
                }

                let html = '';
                items.forEach(item => {
                    // 이미지가 없을 때를 대비한 샘플 이미지
                    const image = item.MAIN_IMG_NORMAL || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e';
                    
                    html += `
                    <div class="group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 border border-gray-100 flex flex-col">
                        <!-- 이미지 구역 -->
                        <div class="relative overflow-hidden aspect-[4/3]">
                            <img src="${image}" alt="${item.MAIN_TITLE}" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-5 left-5">
                                <span class="bg-white/90 backdrop-blur text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm tracking-widest uppercase">
                                    ${item.GUGUN_NM || 'BUSAN'}
                                </span>
                            </div>
                        </div>
                        
                        <!-- 텍스트 구역 -->
                        <div class="p-8 flex-1 flex flex-col">
                            <h3 class="text-xl font-extrabold text-gray-800 mb-4 group-hover:text-blue-600 transition-colors line-clamp-1">
                                ${item.MAIN_TITLE}
                            </h3>
                            <p class="text-gray-500 text-sm line-clamp-3 leading-relaxed mb-8 flex-1">
                                ${item.ITEMCNTNTS || '상세 정보가 없습니다.'}
                            </p>
                            
                            <div class="pt-6 border-t border-gray-50 flex justify-between items-center">
                                <div class="flex items-center text-[10px] font-bold text-gray-400 uppercase tracking-tighter">
                                    <span class="mr-1">📍</span>
                                    ${item.ADDR1.split(' ').slice(0, 2).join(' ')}
                                </div>
                                <a href="https://map.kakao.com/?q=${encodeURIComponent(item.MAIN_TITLE)}" target="_blank" 
                                   class="text-[10px] font-black text-blue-600 hover:underline tracking-tighter">
                                    MAP VIEW →
                                </a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                
                grid.innerHTML = html;
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500">데이터를 불러오지 못했습니다.</div>';
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
